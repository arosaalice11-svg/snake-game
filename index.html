<!DOCTYPE html>
	<html lang="pt-br">

		<head>
			<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">

			<title>Jogo da cobrinha</title>

			<style>
				.container {
					text-align: center;
					background-color: rgb(240, 11, 202);
					padding: 30px;
					border-radius: 20px;
					box-shadow: 0px 10px 30px #000000FF;
				}

				.info {
					font-size: 1em;
				}

				.pontuacao {
					font-weight: bold;
					color: #28A745;
				}

				.recorde {
					font-weight: bold;
					color: #A72839;
				}

				#canvas {
					border: 3px solid #000000FF;
					border-radius: 10px;
					background-color: rgb(240, 11, 202);
					display: block;
					margin: 20px auto;
					box-shadow: 0px 5px 15px #00000022
				}

				button {
					font-size: 16px;
					cursor: pointer;
					background-color: rgb(0, 0, 0);
					padding: 12px 25px;
					color: rgb(255, 255, 255);
					border: none;
					border-radius: 8px;
					margin: 5px;
					transition: all 0.3s ease;
				}

				.teclas {
					display: grid;
					grid-template-columns: repeat(3, 50px);
					gap: 5px;
					justify-content:center;
					margin: 15px auto;
				}

				.tecla {
                    			width: 50px;
                    			height: 50px;
                    			background-color: rgb(0, 0, 0);
               				color: #FFFFFFFF;
                    			border: none;
                    			cursor: pointer;
                    			border-radius: 5px;
                    			font-size: 20px;
                    			display: flex;
                    			align-items: center;
                    			justify-content: center;
                    			font-weight: bold;
				}

				.tecla.vazia {
                    			background-color: rgb(240, 11, 202);
                    			cursor: default;
				}

				.tecla:active {
                    			background-color: rgb(255, 255, 255);
				}

				.instrucoes {
					margin-top: 20px;
					padding: 15px;
					background-color: #FFFFFFFF;
					border-radius: 10px;
					font-size: 14px;
					color: #000000FF
                }
			</style>
		</head>

		<body>
			<div class="container">
				<h1>&#128013; Jogo da Cobrinha</h1>

				<div class="info">
					<div class="pontuacao">
						Pontuação: <span id="pontos"></span>
					</div>
					<div class="recorde">
						Recorde: <span id="recorde"></span>
					</div>
				</div>

				<canvas id="canvas" width="400" height="400">
				</canvas>

				<div>
					<button onclick="init();"> Iniciar Jogo </button>
					<button onclick="pause();"> Pausar / Continuar </button>
				</div>

				<div class="teclas">
					<div class="tecla vazia"></div>

					<div class="tecla" onclick="novaDirecao('cima')">&#9650;</div>

					<div class="tecla vazia"></div>

					<div class="tecla" onclick="mudarDirecao('esquerda')">&#9668;</div>
					<div class="tecla" onclick="mudarDirecao('baixo')">&#9660;</div>
					<div class="tecla" onclick="mudarDirecao('direita')">&#9658;</div>
				</div>

				<div>
					<h3>Como jogar:</h3>
					<p>Use as setas do teclado ou os botões acima para controlar a cobra</p>
					<p>Coma as maçãs vermelhas para crescer e ganhar pontos</p>
					<p>Não bata nas paredes nem no próprio corpo</p>
				</div>
			</div>

			<script>
                const canvas = document.getElementById('canvas');
				const ctx = canvas.getContext('2d');
				const tamanhoQuadrado = 20;
				const quantidadeQuadrado = canvas.width/ tamanhoQuadrado;
				let cobra;
				let direcao;
				let proximaDirecao;
				let comida;
				let pontos;
				let record;
				let jogoAtivo;
				let jogoPausado;
				let intervaloJogo;
				recorde = localStorage.getItem('recordeCobrinha') || 156888;
				document.getElementById('recorde').textContent = recorde;

				         { x: 10, y:10},

						 { x: 8, y: 10},
					];
				}

			
				


                function mudarDirecao(novaDirecao){
                    console.log(novaDirecao)
                
                }

				function pause()
				{
					console.log("Jogo pausou");
				}
			</script>
            
		</body>

</html>
