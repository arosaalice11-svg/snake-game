<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <!--
            <meta charset> Define o conjunto de carateres (enconding)
            da pagina. UTF-8 garante que acentos e caracteres especiais 
            apareçam corretamente. 
        -->
            <meta name="viewport" content="width=device-width, initial-scale= 1.0">
            <!--
            <meta viewport>: esta tag é importante para sites que devem funcionar
            em dispositivos moveis (celular). width-device -> garante que a 
            largura da pagina vai se adaptar á largura do dispositivo.
            initial-scale=1 -> nao aplica zoom automatico ao abrir a pagina.
            Sem ela o celular vei tentar mostrar a página como se fosse um computador
        -->
        <title>Jogo da cobrinha</title>
        <!--
        Estilos e CSS vão ficar abaixo desta linha - Proxima Aual 
        -->

        <style>

             .container {
                text-align: center;
                background-color: rgb(255, 0, 212);
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0px 10px 30px blue;
             }
              
              .info {
                   font-size: 1em;
              }

              .pontuacao {
                 font-weight: bold;
                 color:black;
              }
                .record{ 
                    font-weight: bold;
                    color:black;
                }

                #canvas{
                    border: 3px solid #000000;
                    border-radius: 10px;
                    background-color: rgb(255, 0, 212);
                    display: block;

                    margin: 20px auto;
                }

                button {

                    font-size: 16px;
                    cursor: pointer;
                    background-color: #050505;
                    padding: 12px 25px;
                    color: white;
                    border: none;
                    border-radius: 8px;
                    margin: 5px;
                    transition: all 0.3s ease;
                }
        </style>
        </head>
        <body> 
            <div class="container">
                <h1>&#128013; Jogo da cobrinha</h1>

                <div class="info">
                    <div class="pontuacao">
                            Pontuação: <span id="pontos">0</span>
                    </div>
                    <div class="record">
                            Recorde:<span id="recorde">0</span>
                    </div>
                </div>
                
                 <canvas id="canvas" widht="400" height="400">
                    <!--
                    <canvas>: é um elemento especial para desenho 2D ou 3D. Por si só, 
                    é apenas um retângulo vazio. O JavasScript vai usar o "contexto 2D"
                    para desenhar a cobra, e comida, etc   
                    -->
                </canvas>

                <div  class="controles">
                    <button onclick="alert('Em construção')">Iniciar Jogo</button>
                    <button>Pausar / Continuar</button>
                </div>

                <div class="teclas">
                    <div class= "tecla vazia"></div>

                    <div>&#9650;</div>

                    <div class="tecla vizia"></div>
                    
                    <div></div>

                    <div></div>

                    <div></div>
                </div>
           
            </div>
         
            <script>
                function iniciarJogo(){
                    console.log('Jogo começou!!');
                }
                function pausarJogo(){
                    console,log('Pausa no jogo');
                }



            
            </script>
            

        </body>

   
</html>
